name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython
      
      - name: Create main.py
        run: |
          cat > main.py << 'EOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.textinput import TextInput
from kivy.uix.spinner import Spinner
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.clock import Clock
import yt_dlp
import threading

class YouTubeDownloaderApp(App):
    def build(self):
        layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
        
        self.url_input = TextInput(
            hint_text='📹 Pega la URL de YouTube aquí',
            multiline=False,
            size_hint=(1, 0.15)
        )
        
        self.quality_spinner = Spinner(
            text='🎯 Mejor Calidad',
            values=[
                '🎯 Mejor Calidad',
                '🎵 Solo Audio MP3',
                '📱 720p HD',
                '📱 480p SD'
            ],
            size_hint=(1, 0.12)
        )
        
        self.download_btn = Button(
            text='⬇️ DESCARGAR ⬇️',
            background_color=(0, 0.8, 0, 1),
            size_hint=(1, 0.15)
        )
        self.download_btn.bind(on_press=self.start_download)
        
        self.status = Label(text='✅ Estado: Listo', size_hint=(1, 0.1))
        
        layout.add_widget(Label(text='[b]YouTube Downloader Pro[/b]', markup=True, size_hint=(1, 0.1)))
        layout.add_widget(self.url_input)
        layout.add_widget(self.quality_spinner)
        layout.add_widget(self.download_btn)
        layout.add_widget(self.status)
        
        return layout
    
    def start_download(self, instance):
        url = self.url_input.text.strip()
        if not url:
            self.status.text = '❌ Error: Ingresa URL'
            return
        
        self.download_btn.disabled = True
        
        def download_thread():
            try:
                quality_map = {
                    '🎯 Mejor Calidad': 'best',
                    '🎵 Solo Audio MP3': 'bestaudio',
                    '📱 720p HD': 'best[height<=720]',
                    '📱 480p SD': 'best[height<=480]'
                }
                
                format_code = quality_map.get(self.quality_spinner.text, 'best')
                
                ydl_opts = {
                    'outtmpl': '/storage/emulated/0/Download/%(title)s.%(ext)s',
                    'format': format_code,
                    'quiet': True,
                }
                
                if 'Solo Audio' in self.quality_spinner.text:
                    ydl_opts['postprocessors'] = [{
                        'key': 'FFmpegExtractAudio',
                        'preferredcodec': 'mp3',
                    }]
                
                Clock.schedule_once(lambda dt: setattr(self.status, 'text', '📥 Descargando...'), 0)
                
                with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                    info = ydl.extract_info(url, download=True)
                    titulo = info.get('title', 'Video')
                    
                    Clock.schedule_once(lambda dt: setattr(self.status, 'text', f'✅ Completado: {titulo[:30]}'), 0)
                    
            except Exception as e:
                Clock.schedule_once(lambda dt: setattr(self.status, 'text', f'❌ Error: {str(e)[:50]}'), 0)
            finally:
                Clock.schedule_once(lambda dt: setattr(self.download_btn, 'disabled', False), 0)
        
        threading.Thread(target=download_thread).start()

if __name__ == '__main__':
    YouTubeDownloaderApp().run()
EOF
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = YouTube Downloader Pro
package.name = youtubedownloader
package.domain = org.ytdownloader
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0.0
requirements = python3,kivy,yt-dlp
orientation = portrait
fullscreen = 0

[app]
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 30
android.minapi = 21
android.ndk = 23b
android.sdk = 30

[buildozer]
log_level = 2
warn_on_root = 1
EOF
      
      - name: Initialize buildozer
        run: buildozer init
      
      - name: Build APK
        run: buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Downloader-APK
          path: bin/*.apk
