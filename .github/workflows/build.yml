name: Build YouTube Downloader APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip openjdk-17-jdk
        pip install buildozer cython
    
    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.textinput import TextInput
from kivy.uix.spinner import Spinner
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.progressbar import ProgressBar
from kivy.clock import Clock
import yt_dlp
import threading

class YTDownloader(App):
    def build(self):
        layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
        self.url = TextInput(hint_text='URL de YouTube', multiline=False)
        self.quality = Spinner(text='Mejor Calidad', values=['Mejor Calidad', 'Solo Audio', '720p', '480p'])
        self.btn = Button(text='DESCARGAR', background_color=(0,1,0,1))
        self.status = Label(text='Listo')
        self.btn.bind(on_press=self.download)
        layout.add_widget(self.url)
        layout.add_widget(self.quality)
        layout.add_widget(self.btn)
        layout.add_widget(self.status)
        return layout
    
    def download(self, instance):
        url = self.url.text.strip()
        if not url:
            self.status.text = 'Error: Ingresa URL'
            return
        self.btn.disabled = True
        def thread():
            try:
                qmap = {'Mejor Calidad': 'best', 'Solo Audio': 'bestaudio', '720p': 'best[height<=720]', '480p': 'best[height<=480]'}
                opts = {'outtmpl': '/storage/emulated/0/Download/%(title)s.%(ext)s', 'format': qmap.get(self.quality.text, 'best'), 'quiet': True}
                with yt_dlp.YoutubeDL(opts) as ydl:
                    ydl.extract_info(url, download=True)
                Clock.schedule_once(lambda dt: setattr(self.status, 'text', 'Completado!'), 0)
            except Exception as e:
                Clock.schedule_once(lambda dt: setattr(self.status, 'text', f'Error: {str(e)[:50]}'), 0)
            finally:
                Clock.schedule_once(lambda dt: setattr(self.btn, 'disabled', False), 0)
        threading.Thread(target=thread).start()

if __name__ == '__main__':
    YTDownloader().run()
EOF
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = YT Downloader
package.name = ytdownloader
package.domain = org.ytdownloader
requirements = python3,kivy,yt-dlp
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE
android.api = 30

[buildozer]
log_level = 2
EOF
    
    - name: Build APK
      run: |
        buildozer init
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: youtube-downloader-apk
        path: bin/*.apk
