name: Build YouTube Downloader APK

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip openjdk-17-jdk git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
    
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Create main.py
      run: |
        cat > main.py << 'PYTHON_EOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.textinput import TextInput
from kivy.uix.spinner import Spinner
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.progressbar import ProgressBar
from kivy.clock import Clock
import yt_dlp
import threading
import os

class YouTubeDownloaderApp(App):
    def build(self):
        layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
        
        self.url_input = TextInput(
            hint_text='📹 Pega la URL de YouTube aquí',
            multiline=False,
            size_hint=(1, 0.15)
        )
        
        self.quality_spinner = Spinner(
            text='🎯 Mejor Calidad',
            values=[
                '🎯 Mejor Calidad (Video+Audio)',
                '🎵 Solo Audio MP3',
                '📺 1080p Full HD',
                '📱 720p HD',
                '📱 480p SD'
            ],
            size_hint=(1, 0.12)
        )
        
        self.download_btn = Button(
            text='⬇️ DESCARGAR ⬇️',
            background_color=(0, 0.8, 0, 1),
            size_hint=(1, 0.15)
        )
        self.download_btn.bind(on_press=self.start_download)
        
        self.progress = ProgressBar(max=100, value=0, size_hint=(1, 0.08))
        
        self.status = Label(text='✅ Estado: Listo para descargar', size_hint=(1, 0.1))
        
        layout.add_widget(Label(text='[b]YouTube Downloader Pro[/b]', markup=True, size_hint=(1, 0.1)))
        layout.add_widget(self.url_input)
        layout.add_widget(self.quality_spinner)
        layout.add_widget(self.download_btn)
        layout.add_widget(self.progress)
        layout.add_widget(self.status)
        
        return layout
    
    def start_download(self, instance):
        url = self.url_input.text.strip()
        if not url:
            self.status.text = '❌ Error: Ingresa una URL de YouTube'
            return
        
        self.download_btn.disabled = True
        self.progress.value = 0
        
        def download_thread():
            try:
                quality_map = {
                    '🎯 Mejor Calidad (Video+Audio)': 'bestvideo+bestaudio/best',
                    '🎵 Solo Audio MP3': 'bestaudio/best',
                    '📺 1080p Full HD': 'bestvideo[height<=1080]+bestaudio/best[height<=1080]',
                    '📱 720p HD': 'bestvideo[height<=720]+bestaudio/best[height<=720]',
                    '📱 480p SD': 'bestvideo[height<=480]+bestaudio/best[height<=480]'
                }
                
                format_code = quality_map.get(self.quality_spinner.text, 'best')
                
                ydl_opts = {
                    'outtmpl': '/storage/emulated/0/Download/%(title)s.%(ext)s',
                    'format': format_code,
                    'quiet': True,
                    'no_warnings': True,
                }
                
                if 'Solo Audio MP3' in self.quality_spinner.text:
                    ydl_opts['postprocessors'] = [{
                        'key': 'FFmpegExtractAudio',
                        'preferredcodec': 'mp3',
                        'preferredquality': '192',
                    }]
                
                Clock.schedule_once(lambda dt: setattr(self.status, 'text', '📥 Descargando...'), 0)
                
                with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                    info = ydl.extract_info(url, download=True)
                    titulo = info.get('title', 'Video')
                    
                    Clock.schedule_once(lambda dt: setattr(self.progress, 'value', 100), 0)
                    Clock.schedule_once(lambda dt: setattr(self.status, 'text', f'✅ ¡Completado! {titulo} guardado en Descargas'), 0)
                    
            except Exception as e:
                Clock.schedule_once(lambda dt: setattr(self.status, 'text', f'❌ Error: {str(e)[:80]}'), 0)
            finally:
                Clock.schedule_once(lambda dt: setattr(self.download_btn, 'disabled', False), 0)
        
        threading.Thread(target=download_thread).start()

if __name__ == '__main__':
    YouTubeDownloaderApp().run()
PYTHON_EOF
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'SPEC_EOF'
[app]
title = YouTube Downloader Pro
package.name = ytdownloaderpro
package.domain = org.downloader
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0.0
requirements = python3==3.9.7,kivy==2.1.0,yt-dlp==2023.10.13,android
orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.1.0
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1

[app]
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,ACCESS_NETWORK_STATE
android.api = 30
android.minapi = 21
android.ndk = 23b
android.sdk = 30
android.entitlement = 1
android.gradle_dependencies = 
android.enable_androidx = True
SPEC_EOF
    
    - name: Initialize buildozer
      run: |
        buildozer init
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: YouTube-Downloader-APK
        path: bin/*.apk
